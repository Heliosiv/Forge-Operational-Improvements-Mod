name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
      - "!v*-test.*"
  workflow_dispatch:
    inputs:
      publish_foundry:
        description: "Publish the current module.json version to the official Foundry package listing."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 1) Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2) Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3) Read module version
        id: module_meta
        shell: bash
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('module.json','utf8')).version")
          if [ -z "$VERSION" ]; then
            echo "module.json version is empty" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: 4) Validate governance for branch builds
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: node scripts/validate-governance.mjs --mode ci

      - name: 5) Validate governance for tagged releases
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/validate-governance.mjs --mode release --expected-tag "${GITHUB_REF_NAME}"

      - name: 6) Run repository checks
        run: npm run check

      - name: 7) Validate module.json version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MODULE_VERSION="${{ steps.module_meta.outputs.version }}"
          echo "Tag version:    ${TAG_VERSION}"
          echo "Module version: ${MODULE_VERSION}"
          test "${TAG_VERSION}" = "${MODULE_VERSION}"

      - name: 8) Prepare canonical release package
        run: npm run prepare:release

      - name: 10) Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: party-operations-package
          path: |
            release/module.zip
            release/module.zip.sha256.txt
            release/module.json
            release/README.md
            release/RELEASE_NOTES.md

      - name: 11) Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.module_meta.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/module.zip release/module.zip.sha256.txt release/module.json release/RELEASE_NOTES.md --clobber
          else
            gh release create "$RELEASE_TAG" release/module.zip release/module.zip.sha256.txt release/module.json release/RELEASE_NOTES.md \
              --title "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --generate-notes
          fi

      - name: 12) Publish Foundry package listing
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_foundry == 'true')
        env:
          FOUNDRY_PACKAGE_RELEASE_TOKEN: ${{ secrets.FOUNDRY_PACKAGE_RELEASE_TOKEN }}
        run: |
          if [ -z "$FOUNDRY_PACKAGE_RELEASE_TOKEN" ]; then
            echo "FOUNDRY_PACKAGE_RELEASE_TOKEN repository secret is required so Foundry and Forge see this release." >&2
            exit 1
          fi
          npm run publish:foundry

      - name: 13) Verify public release publication
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_foundry == 'true')
        run: >
          node scripts/verify-release-publication.mjs
          --version "${{ steps.module_meta.outputs.version }}"
          --require-forge
          --timeout-ms 900000
          --interval-ms 60000
